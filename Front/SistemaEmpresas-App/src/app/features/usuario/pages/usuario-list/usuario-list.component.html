<h2>Usuarios</h2>
<div class="card rounded shadow-sm p-3">
  <div class="d-flex">
    <div class="flex-fill pe-3">
      <div class="input-group mb-2">
        <div class="input-group-prepend">
          <div class="input-group-text">Filtro:</div>
        </div>
        <input
          type="text"
          class="form-control me-2"
          placeholder="Filtrar por razão nome ou e-mail"
        />
      </div>
    </div>
    <div>
      <a class="d-flex btn btn-outline-success" routerLink="novo">
        <i class="fa fa-plus-circle my-1"></i>
        <b class="ms-1 d-none d-sm-block">Inserir</b>
      </a>
    </div>
  </div>
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Data de criação</th>
        <th>Ações</th>
      </tr>
    </thead>

    <tbody>
      @for (u of usuarios; track u.id) {
        <tr>
          <td>{{ u.nome }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.dataCriacao}}</td>
          <td>
            <button class="btn btn-sm btn-primary me-2" (click)="usuarioDetalhe(u.id)">
              Editar
            </button>
            <button class="btn btn-sm btn-danger" (click)="openModal($event, template, u.id)">
              Excluir
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
<ng-template #template>
  <div class="modal-body text-center">
    <p>Deseja realmente excluir este usuario?</p>
    <button type="button" class="btn btn-default" (click)="confirm()">Sim</button>
    <button type="button" class="btn btn-primary" (click)="declined()">Não</button>
  </div>
</ng-template>
